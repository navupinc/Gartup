<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartup | Smart Mapping</title>
    
    <link rel="icon" type="image/png" href="GartupLogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lexend:wght@600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        :root {
            --gartup-yellow: #FFE900;
            --gartup-black: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 32px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: #fafafa; 
            color: var(--gartup-black); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header {
            background: var(--gartup-yellow);
            height: 70px; /* Aumentado ligeramente para acomodar el banner más grande */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 3000;
            flex-shrink: 0;
        }

        .icon-btn {
            background: white;
            border: none;
            border-radius: 12px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: 0.2s;
        }

        /* BANNER MÁS GRANDE */
        .brand-logo img { height: 45px; width: auto; }

        .search-pod {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            z-index: 2500; 
        }

        .leaflet-control-geocoder {
            border-radius: 15px !important;
            border: none !important;
            box-shadow: var(--shadow) !important;
            background: white !important;
            width: 100% !important;
            margin: 0 !important;
        }

        .leaflet-control-geocoder-form input {
            font-size: 16px !important;
            padding: 12px !important;
            border-radius: 15px !important;
        }

        .leaflet-control-geocoder-results {
            max-height: 250px !important;
            overflow-y: auto !important;
            border-radius: 0 0 15px 15px !important;
            box-shadow: var(--shadow) !important;
        }

        #map { flex: 1; width: 100%; z-index: 1; }

        #menu-drawer {
            position: fixed; top: 0; left: -310px; width: 300px; height: 100%;
            background: white; z-index: 5000;
            transition: 0.3s ease-out;
            padding: 40px 25px;
        }
        #menu-drawer.open { transform: translateX(310px); }
        
        .menu-link {
            padding: 14px; margin-bottom: 10px; border-radius: 12px;
            background: #f4f4f6; font-size: 14px; cursor: pointer;
        }

        #ai-friend {
            position: fixed;
            bottom: 85px; 
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 380px;
            height: 450px;
            max-height: 50vh;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: var(--shadow);
            z-index: 4000;
            display: none;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.5);
            overflow: hidden;
        }

        #ai-top {
            padding: 15px;
            background: var(--gartup-yellow);
            display: flex; justify-content: space-between; align-items: center;
        }
        #ai-top span { font-family: 'Lexend'; font-weight: 600; color: #000 !important; }

        #ai-chat { 
            flex: 1; padding: 15px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 10px;
        }

        .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.4; max-width: 85%; }
        .ai-bubble { background: white; align-self: flex-start; border: 1px solid #eee; }
        .user-bubble { background: var(--gartup-yellow); align-self: flex-end; font-weight: 500; }

        #ai-form { 
            padding: 12px; border-top: 1px solid #eee;
            display: flex; gap: 8px; background: white;
        }
        #ai-form input { 
            flex: 1; border: 1px solid #eee; background: #f9f9f9; 
            padding: 10px; border-radius: 10px; outline: none;
        }
        #ai-form button { 
            background: var(--gartup-black); color: white; border: none; 
            padding: 0 15px; border-radius: 10px; cursor: pointer;
        }

        .fab-group {
            position: absolute; bottom: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .fab {
            width: 50px; height: 50px; background: white;
            border: none; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; box-shadow: var(--shadow);
            transition: background 0.2s;
        }
        .fab:active { background: #f0f0f0; }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.15);
            backdrop-filter: blur(3px); z-index: 4500; display: none;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleNav()"></div>

    <nav id="menu-drawer">
        <h2 style="margin-bottom:20px; font-family: 'Lexend';">Map Settings</h2>
        <div class="menu-link" onclick="swapMap('vibrant')">Street View</div>
        <div class="menu-link" onclick="swapMap('sat')">Satellite</div>
        <div class="menu-link" onclick="swapMap('dark')">Dark View</div>
        <div class="menu-link" onclick="location.reload()" style="color:red;">Refresh App</div>
    </nav>

    <header>
        <button class="icon-btn" onclick="toggleNav()">☰</button>
        <div class="brand-logo"><img src="GartupBanner.png" alt="Gartup"></div>
        <div style="width: 40px;"></div>
    </header>

    <div class="search-pod" id="search-mount"></div>

    <div id="map"></div>

    <div id="ai-friend">
        <div id="ai-top">
            <span>Gartup Assistant</span>
            <span style="cursor:pointer; font-weight: bold;" onclick="toggleAI()">×</span>
        </div>
        <div id="ai-chat">
            <div class="bubble ai-bubble">Hey! How can I help you explore today? 😊</div>
        </div>
        <div id="ai-form">
            <input type="text" id="ai-input" placeholder="Say hi...">
            <button onclick="askAI()">Go</button>
        </div>
    </div>

    <div class="fab-group">
        <button class="fab" onclick="toggleAI()">🤖</button>
        <button class="fab" onclick="map.zoomIn()">+</button>
        <button class="fab" onclick="map.zoomOut()">−</button>
        <button class="fab" onclick="findMe()">🎯</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <script>
        const _s = ["gsk_", "WPZXEXNR", "7HGkYIIT", "nyyiWGdy", "b3FY5GE5", "sw0oQFZI", "QLhiZcy6", "aZTn"];
        const _key = _s.join('');

        let _log = [{ role: "system", content: "You are the Gartup Assistant. Be friendly, informal, and helpful. Use English." }];

        const layers = {
            vibrant: L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png'),
            sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png')
        };

        const map = L.map('map', {
            center: [20, 0],
            zoom: 2,
            layers: [layers.vibrant],
            zoomControl: false
        });

        function findMe() {
            map.locate({ 
                setView: true, 
                maxZoom: 16,
                enableHighAccuracy: true 
            });
        }

        map.on('locationfound', (e) => {
            const radius = e.accuracy / 2;
            L.marker(e.latlng).addTo(map)
                .bindPopup("You are within " + radius + " meters from this point").openPopup();
            L.circle(e.latlng, radius, { color: '#FFE900' }).addTo(map);
        });

        map.on('locationerror', (e) => {
            alert("Gartup couldn't find your location: " + e.message);
        });

        const geocoder = L.Control.geocoder({
            placeholder: "Search for a place...",
            collapsed: false,
            defaultMarkGeocode: true
        }).on('markgeocode', (e) => {
            map.flyTo(e.geocode.center, 16);
        }).addTo(map);
        
        document.getElementById('search-mount').appendChild(geocoder.getContainer());

        function toggleNav() {
            const d = document.getElementById('menu-drawer');
            const o = document.getElementById('overlay');
            const isOpen = d.classList.toggle('open');
            o.style.display = isOpen ? 'block' : 'none';
        }

        function swapMap(type) {
            Object.values(layers).forEach(l => map.removeLayer(l));
            map.addLayer(layers[type]);
            toggleNav();
        }

        function toggleAI() {
            const p = document.getElementById('ai-friend');
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
        }

        async function askAI() {
            const input = document.getElementById('ai-input');
            const chat = document.getElementById('ai-chat');
            const val = input.value.trim();
            if (!val) return;

            chat.innerHTML += `<div class="bubble user-bubble">${val}</div>`;
            _log.push({ role: "user", content: val });
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${_key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: _log.slice(-6) })
                });
                const d = await r.json();
                const reply = d.choices[0].message.content;
                _log.push({ role: "assistant", content: reply });
                chat.innerHTML += `<div class="bubble ai-bubble">${reply}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="bubble ai-bubble">Sorry, I'm having trouble connecting.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById('ai-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') askAI(); });
    </script>
</body>
</html>
