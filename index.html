<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartup | World Index</title>
    <link rel="icon" type="image/png" href="GartupLogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FFE900;
            --bg: #ffffff;
            --text: #111111;
            --border: #f0f0f2;
            --card-bg: #ffffff;
            --link-blue: #1a0dab;
            --anim-speed: 0.4s;
        }

        [data-theme="dark"] {
            --bg: #0a0a0b;
            --text: #f5f5f7;
            --border: #1f1f22;
            --card-bg: #161618;
            --link-blue: #8ab4f8;
        }

        * { transition: background 0.3s, color 0.3s; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; min-height: 100vh;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeInUp var(--anim-speed) ease forwards; }

        .decoration-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent), #ff9100, var(--accent));
            z-index: 1100;
        }

        /* Header / Nav */
        header {
            width: 100%; padding: 15px 20px; display: flex; align-items: center;
            justify-content: space-between; position: fixed; top: 0; z-index: 1000;
            background: var(--bg); border-bottom: 1px solid transparent;
        }

        body.searching header { border-bottom-color: var(--border); backdrop-filter: blur(10px); }

        .nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-logo-small { height: 28px; cursor: pointer; display: none; }
        body.searching .nav-logo-small { display: block; }

        /* Search Bar Responsive */
        .search-container {
            width: 100%; max-width: 600px; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body.home .search-container { margin: 0 auto; }
        body.searching .search-container { max-width: 400px; margin: 0; position: absolute; left: 50%; transform: translateX(-50%); }

        .search-bar {
            background: var(--card-bg); border: 2px solid var(--border);
            padding: 6px 10px 6px 18px; border-radius: 50px; 
            display: flex; align-items: center; width: 100%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }
        .search-bar:focus-within { border-color: var(--accent); }
        
        input#user-input { 
            flex: 1; border: none; outline: none; background: transparent; 
            font-size: 16px; color: var(--text); padding: 8px 0; width: 100%;
        }

        .btn-search { 
            background: var(--accent); color: #000; border: none; 
            padding: 8px 20px; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 14px;
        }

        /* Home Layout */
        .main-home {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px; text-align: center;
        }
        .main-logo { width: 280px; max-width: 80%; margin-bottom: 35px; cursor: pointer; }

        /* Article Layout */
        #response-frame { 
            width: 100%; max-width: 900px; margin: 90px auto 40px; 
            padding: 0 15px; display: none; 
        }
        
        .article-card { 
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 30px; border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        .article-title { font-family: 'Lexend'; font-size: 32px; margin-bottom: 20px; line-height: 1.2; }
        .article-body { font-size: 17px; line-height: 1.7; opacity: 0.9; }
        
        /* Overriding Wikipedia leftovers */
        .article-body * { font-family: inherit !important; color: inherit !important; background: transparent !important; }
        .article-body p { margin-bottom: 20px; }
        .article-body a { color: var(--link-blue) !important; text-decoration: none; font-weight: 600; }
        .article-body img { border-radius: 12px; margin: 10px 0; max-width: 100%; height: auto; }

        .nodes-label { font-size: 10px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 2px; margin: 40px 0 20px; display: block; text-align: center;}

        .related-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; width: 100%; padding-bottom: 40px;
        }
        .node-item {
            background: var(--card-bg); padding: 15px; border-radius: 18px;
            border: 1px solid var(--border); cursor: pointer; text-align: center; font-size: 14px; font-weight: 700;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            body.searching .search-container { max-width: 180px; left: 60%; }
            .btn-search { display: none; } 
            .article-card { padding: 25px; border-radius: 20px; }
            .article-title { font-size: 28px; }
            .main-logo { width: 220px; }
        }

        .loader { display: none; text-align: center; padding: 150px 20px; font-weight: 800; opacity: 0.5; font-size: 14px; letter-spacing: 2px; }

        body.searching .main-home { display: none; }
        body.searching #response-frame { display: block; }
        body.home #response-frame { display: none; }
        body.home .main-home { display: flex; }

    </style>
</head>
<body id="body" class="home">

    <div class="decoration-line"></div>

    <header>
        <div class="nav-left">
            <img src="GartupBanner.png" alt="Gartup" class="nav-logo-small" onclick="goHome()">
        </div>
        
        <div class="search-container">
            <div class="search-bar">
                <input type="text" id="user-input" placeholder="Search the index..." autocomplete="off">
                <button class="btn-search" onclick="handleSearchClick()">Search</button>
            </div>
        </div>

        <span class="theme-btn" onclick="toggleTheme()" style="cursor:pointer; opacity:0.6; font-size: 20px;">🌓</span>
    </header>

    <main class="main-home fade-in">
        <img src="GartupBanner.png" alt="Gartup" class="main-logo" onclick="goHome()">
    </main>

    <div id="status" class="loader">INDEXING...</div>

    <div id="response-frame" class="fade-in">
        <div class="article-card">
            <h1 id="article-title" class="article-title"></h1>
            <div id="article-content" class="article-body"></div>
        </div>
        
        <span class="nodes-label">Related Nodes</span>
        <div id="related-grid" class="related-grid"></div>
    </div>

    <script>
        function toggleTheme() {
            const b = document.body;
            b.getAttribute('data-theme') === 'dark' ? b.removeAttribute('data-theme') : b.setAttribute('data-theme', 'dark');
        }

        function goHome() {
            window.history.pushState({}, '', window.location.origin + window.location.pathname);
            document.body.className = "home";
            document.getElementById('status').style.display = "none";
            document.getElementById('user-input').value = "";
            document.title = "Gartup | World Index";
        }

        function handleSearchClick() {
            const q = document.getElementById('user-input').value.trim();
            if (q) nativeSearch(q);
        }

        async function nativeSearch(query) {
            const body = document.body;
            const status = document.getElementById('status');
            const frame = document.getElementById('response-frame');
            const contentElem = document.getElementById('article-content');
            const gridElem = document.getElementById('related-grid');

            const cleanQuery = query.replace(/_/g, ' ');
            const newUrl = window.location.origin + window.location.pathname + '?q=' + encodeURIComponent(cleanQuery);
            window.history.pushState({ query: cleanQuery }, '', newUrl);
            
            body.className = "searching";
            status.style.display = "block";
            frame.style.display = "none";
            
            window.scrollTo({top: 0, behavior: 'smooth'});

            try {
                const searchRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(cleanQuery)}&format=json&origin=*`);
                const searchData = await searchRes.json();
                
                if (!searchData.query.search.length) throw new Error();
                
                const bestTitle = searchData.query.search[0].title;
                document.title = `${bestTitle} - Gartup`;

                const contentRes = await fetch(`https://en.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(bestTitle)}&prop=text&format=json&origin=*&disableeditsection=1&mobileformat=1`);
                const contentData = await contentRes.json();
                
                document.getElementById('article-title').innerText = bestTitle;
                
                let container = document.createElement('div');
                container.innerHTML = contentData.parse.text["*"];
                
                // Aggressive cleaning of Wikipedia artifacts
                const cleanSelectors = [
                    '.infobox', '.ambox', '.navbox', '.metadata', '.mw-editsection', 
                    '.reflist', '.reference', '.hatnote', '.sidebar', '.vertical-navbox',
                    '.mbox-small', '.noprint', '.s_rt', '.plainlinks', '.extiw'
                ];
                cleanSelectors.forEach(sel => {
                    container.querySelectorAll(sel).forEach(el => el.remove());
                });

                // Remove bracketed references [1], [2], etc.
                let rawHTML = container.innerHTML;
                rawHTML = rawHTML.replace(/\[\d+\]/g, ''); 
                container.innerHTML = rawHTML;

                container.querySelectorAll('a').forEach(a => {
                    const href = a.getAttribute('href');
                    if (href && href.startsWith('/wiki/')) {
                        const target = href.replace('/wiki/', '').replace(/_/g, ' ');
                        a.setAttribute('href', `javascript:nativeSearch('${target}')`);
                    } else if (href && (href.startsWith('http') || href.startsWith('//'))) {
                        a.setAttribute('target', '_blank');
                    } else {
                        a.removeAttribute('href');
                    }
                });

                // Force absolute paths for images
                container.querySelectorAll('img').forEach(img => {
                    let src = img.getAttribute('src');
                    if (src && src.startsWith('//')) img.setAttribute('src', 'https:' + src);
                });

                contentElem.innerHTML = container.innerHTML;

                // Load Related Nodes
                gridElem.innerHTML = "";
                searchData.query.search.slice(1, 11).forEach(item => {
                    const node = document.createElement('div');
                    node.className = 'node-item';
                    node.onclick = () => nativeSearch(item.title);
                    node.innerText = item.title;
                    gridElem.appendChild(node);
                });

                status.style.display = "none";
                frame.style.display = "block";
                
                frame.classList.remove('fade-in');
                void frame.offsetWidth; 
                frame.classList.add('fade-in');

            } catch (err) {
                status.style.display = "none";
                frame.style.display = "block";
                document.getElementById('article-title').innerText = "Not Found";
                contentElem.innerHTML = "This node is currently offline or does not exist in the index.";
            }
        }

        window.onpopstate = () => {
            const q = new URLSearchParams(window.location.search).get('q');
            q ? nativeSearch(q) : goHome();
        };

        window.onload = () => {
            const q = new URLSearchParams(window.location.search).get('q');
            if (q) nativeSearch(q);
        };

        document.getElementById('user-input').addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') handleSearchClick(); 
        });
    </script>
</body>
</html>
