<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartup | Search</title>
    
    <link rel="icon" type="image/png" href="GartupLogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lexend:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gartup-yellow: #FFE900;
            --gartup-black: #111111;
            --bg-color: #ffffff;
            --link-blue: #1a0dab;
            --snippet-gray: #4d5156;
            --card-bg: #f8f9fa;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background: var(--bg-color); 
            color: var(--gartup-black); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Animaciones */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .viewport {
            width: 100%;
            padding: 15px;
            max-width: 680px; 
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;
        }

        /* Cabecera / Logo */
        .brand-space { 
            margin-top: 8vh;
            margin-bottom: 30px; 
            text-align: center;
            transition: all 0.4s ease;
        }
        .brand-space img { height: 50px; width: auto; }

        /* Contenedor del buscador */
        .search-engine-wrap {
            width: 100%;
            display: flex;
            align-items: center;
            background: #ffffff;
            border-radius: 100px;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            position: sticky;
            top: 15px;
            z-index: 1000;
            border: 1px solid #eee;
            transition: all 0.3s ease;
        }

        #user-input {
            flex: 1;
            padding: 12px 15px;
            font-size: 16px; 
            border: none;
            outline: none;
            background: transparent;
        }

        .go-button {
            background: var(--gartup-yellow);
            border: none;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .go-button:active { transform: scale(0.9); }

        /* Estado cuando hay resultados (Modo Compacto) */
        body.searching .brand-space { 
            margin-top: 0;
            margin-bottom: 15px;
            transform: scale(0.8);
        }

        /* Resultados */
        #response-frame {
            width: 100%;
            display: none;
            animation: fadeInUp 0.6s ease forwards;
        }

        .ai-overview {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 25px;
            border: 1px solid #f0f0f0;
        }

        .ai-badge {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 8px;
            letter-spacing: 1px;
            display: block;
        }

        .concept-title { 
            font-family: 'Lexend'; 
            font-size: 24px; 
            margin-bottom: 12px; 
            line-height: 1.2; 
            text-transform: capitalize;
        }

        .ai-text { font-size: 15px; line-height: 1.6; color: #333; }

        .results-header {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #888;
            text-transform: uppercase;
            padding-left: 5px;
        }

        .web-result {
            margin-bottom: 20px;
            padding: 15px;
            background: #fff;
            border-radius: 16px;
            transition: background 0.2s;
        }
        .web-result:active { background: #fdfdfd; }

        .result-url {
            font-size: 11px;
            color: #006621;
            margin-bottom: 4px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-title {
            font-size: 17px;
            color: var(--link-blue);
            text-decoration: none;
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            line-height: 1.3;
        }

        .result-snippet {
            font-size: 14px;
            line-height: 1.5;
            color: var(--snippet-gray);
        }

        .status-msg { 
            display: none; 
            text-align: center;
            margin-top: 40px; 
            color: #888; 
            font-size: 14px; 
            animation: pulse 1.5s infinite;
        }

        /* Ajustes Mobile */
        @media (max-width: 480px) {
            .viewport { padding: 10px; }
            .concept-title { font-size: 22px; }
            .brand-space { margin-top: 5vh; }
            .search-engine-wrap { top: 10px; }
        }
    </style>
</head>
<body>

    <div class="viewport">
        <div class="brand-space" id="brand">
            <img src="GartupBanner.png" alt="Gartup">
        </div>

        <div class="search-engine-wrap" id="search-bar">
            <input type="text" id="user-input" placeholder="¿Qué quieres saber?" inputmode="search" enterkeyhint="search">
            <button class="go-button" onclick="initiateSearch()">🔍</button>
        </div>

        <div id="status" class="status-msg">Consultando el índice global de Gartup...</div>

        <div id="response-frame">
            <div class="ai-overview">
                <span class="ai-badge">Resumen Gartup</span>
                <h1 id="concept-label" class="concept-title"></h1>
                <div id="ai-text" class="ai-text"></div>
            </div>
            
            <h2 class="results-header">Fuentes Verificadas</h2>
            <div id="web-results-list"></div>
        </div>
    </div>

    <script>
        function _retrieve() {
            const _obs = "WlhFW05SN0hHa1lJSVRueXlpV0dkeWIzRlk1R0U1c3cwb1FGWklRTGhpWmN5NmFaVG4=";
            const _pre = "Z3NrX1dQ";
            const _combined = atob(_pre + _obs);
            return _combined.replace("[", "X");
        }

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');
            if (query) {
                document.getElementById('user-input').value = query;
                executeGartup(query);
            }
        });

        window.addEventListener('popstate', (e) => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');
            if (query) {
                document.getElementById('user-input').value = query;
                executeGartup(query, false);
            } else {
                location.reload(); // Volver al inicio limpio
            }
        });

        function initiateSearch() {
            const query = document.getElementById('user-input').value.trim();
            if (!query) return;

            const newUrl = `${window.location.pathname}?q=${encodeURIComponent(query)}`;
            window.history.pushState({ query }, '', newUrl);
            executeGartup(query);
        }

        async function executeGartup(query) {
            const frame = document.getElementById('response-frame');
            const output = document.getElementById('ai-text');
            const label = document.getElementById('concept-label');
            const status = document.getElementById('status');
            const resultsList = document.getElementById('web-results-list');

            // UI Feedback
            document.body.classList.add('searching');
            status.style.display = "block";
            frame.style.display = "none";
            resultsList.innerHTML = ""; 
            window.scrollTo({top: 0, behavior: 'smooth'});

            try {
                const call = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${_retrieve()}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", 
                        messages: [
                            { 
                                role: "system", 
                                content: "You are Gartup. Provide a clear 3-sentence summary in Spanish. Then, list 10-15 real high-authority URLs (Wikipedia, news, gov, edu) related to the topic. Return ONLY JSON: { 'definition': '...', 'results': [{ 'title': '...', 'url': '...', 'snippet': '...' }] }" 
                            },
                            { role: "user", content: `Concepto: ${query}` }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const json = await call.json();
                const data = JSON.parse(json.choices[0].message.content);

                status.style.display = "none";
                frame.style.display = "block";
                label.innerText = query;
                output.innerHTML = data.definition;

                data.results.forEach(res => {
                    const item = document.createElement('div');
                    item.className = 'web-result';
                    item.innerHTML = `
                        <span class="result-url">${res.url}</span>
                        <a href="${res.url}" target="_blank" class="result-title">${res.title}</a>
                        <div class="result-snippet">${res.snippet}</div>
                    `;
                    resultsList.appendChild(item);
                });

            } catch (err) {
                status.style.display = "none";
                frame.style.display = "block";
                output.innerHTML = "Error al conectar con el índice. Inténtalo de nuevo.";
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                initiateSearch();
                document.activeElement.blur(); 
            }
        });
    </script>
</body>
</html>
