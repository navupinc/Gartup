<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartup | Search</title>
    
    <link rel="icon" type="image/png" href="GartupLogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lexend:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gartup-yellow: #FFE900;
            --gartup-black: #111111;
            --bg-color: #ffffff;
            --link-blue: #1a0dab;
            --snippet-gray: #4d5156;
            --card-bg: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-color); 
            color: var(--gartup-black); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* MOBILE FIRST VIEWPORT */
        .viewport {
            width: 100%;
            padding: 20px;
            max-width: 680px; /* Limite para desktop */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-space { 
            margin-top: 5vh;
            margin-bottom: 30px; 
            text-align: center; 
        }
        .brand-space img { height: 60px; width: auto; }

        /* SEARCH BAR OPTIMIZED FOR THUMBS */
        .search-engine-wrap {
            width: 100%;
            display: flex;
            align-items: center;
            background: #ffffff;
            border-radius: 100px;
            padding: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            position: sticky;
            top: 15px;
            z-index: 100;
        }

        #user-input {
            flex: 1;
            padding: 12px 18px;
            font-size: 16px; /* Evita zoom automático en iOS */
            border: none;
            outline: none;
            background: transparent;
        }

        .go-button {
            background: var(--gartup-yellow);
            border: none;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        #response-frame {
            width: 100%;
            margin-top: 10px;
            display: none;
        }

        /* AI CARD - MOBILE STYLE */
        .ai-overview {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 30px;
        }

        .ai-badge {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: block;
        }

        .concept-title { font-family: 'Lexend'; font-size: 26px; margin-bottom: 10px; line-height: 1.2; }
        .ai-text { font-size: 15px; line-height: 1.6; color: #333; }

        /* REAL WEB RESULTS */
        .results-header {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #777;
            text-transform: uppercase;
            padding-left: 5px;
        }

        .web-result {
            margin-bottom: 25px;
            padding: 10px 5px;
            border-bottom: 1px solid #f0f0f0;
        }

        .result-url {
            font-size: 12px;
            color: #006621;
            margin-bottom: 4px;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-title {
            font-size: 18px;
            color: var(--link-blue);
            text-decoration: none;
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            line-height: 1.3;
        }

        .result-snippet {
            font-size: 14px;
            line-height: 1.5;
            color: var(--snippet-gray);
        }

        .status-msg { display: none; margin-top: 20px; color: #bbb; font-size: 14px; }
    </style>
</head>
<body>

    <div class="viewport">
        <div class="brand-space">
            <img src="GartupBanner.png" alt="Gartup">
        </div>

        <div class="search-engine-wrap">
            <input type="text" id="user-input" placeholder="Search concept..." inputmode="search" enterkeyhint="search">
            <button class="go-button" onclick="executeGartup()">🔍</button>
        </div>

        <div id="status" class="status-msg">Consulting...</div>

        <div id="response-frame">
            <div class="ai-overview">
                <span class="ai-badge">Gartup Summary</span>
                <h1 id="concept-label" class="concept-title"></h1>
                <div id="ai-text" class="ai-text"></div>
            </div>
            
            <h2 class="results-header">Verified Sources</h2>
            <div id="web-results-list"></div>
        </div>
    </div>

    <script>
        function _retrieve() {
            const _obs = "WlhFW05SN0hHa1lJSVRueXlpV0dkeWIzRlk1R0U1c3cwb1FGWklRTGhpWmN5NmFaVG4=";
            const _pre = "Z3NrX1dQ";
            const _combined = atob(_pre + _obs);
            return _combined.replace("[", "X");
        }

        async function executeGartup() {
            const query = document.getElementById('user-input').value.trim();
            const frame = document.getElementById('response-frame');
            const output = document.getElementById('ai-text');
            const label = document.getElementById('concept-label');
            const status = document.getElementById('status');
            const resultsList = document.getElementById('web-results-list');

            if (!query) return;

            status.style.display = "block";
            frame.style.display = "none";
            resultsList.innerHTML = ""; 
            window.scrollTo({top: 0, behavior: 'smooth'});

            try {
                const call = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${_retrieve()}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", 
                        messages: [
                            { 
                                role: "system", 
                                content: "You are a professional real-world web indexer for Gartup. Provide a 3-sentence summary of the query in English. Then, provide exactly 50 REAL, DYNAMIC, and UNIQUE website sources (Wikipedia, .gov, .edu, official news, authoritative sites) that actually exist and would have info on this. All titles and snippets must be in English. Return ONLY JSON: { 'definition': '...', 'results': [{ 'title': '...', 'url': '...', 'snippet': '...' }] }" 
                            },
                            { role: "user", content: `Search: ${query}` }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const json = await call.json();
                const data = JSON.parse(json.choices[0].message.content);

                status.style.display = "none";
                frame.style.display = "block";
                label.innerText = query;
                output.innerHTML = data.definition;

                // Dynamic fragment for bug-free rendering of 50 results
                const fragment = document.createDocumentFragment();
                data.results.forEach(res => {
                    const resDiv = document.createElement('div');
                    resDiv.className = 'web-result';
                    resDiv.innerHTML = `
                        <span class="result-url">${res.url}</span>
                        <a href="${res.url}" target="_blank" class="result-title">${res.title}</a>
                        <div class="result-snippet">${res.snippet}</div>
                    `;
                    fragment.appendChild(resDiv);
                });
                resultsList.appendChild(fragment);

            } catch (err) {
                status.style.display = "none";
                frame.style.display = "block";
                output.innerHTML = "System busy. Try again.";
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                executeGartup();
                document.activeElement.blur(); 
            }
        });
    </script>
</body>
</html>
