<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartup | World Index</title>
    <link rel="icon" type="image/png" href="GartupLogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FFE900;
            --bg: #ffffff;
            --text: #111111;
            --border: #f0f0f2;
            --card-bg: #ffffff;
            --link-blue: #1a0dab;
        }

        [data-theme="dark"] {
            --bg: #0a0a0b;
            --text: #f5f5f7;
            --border: #1f1f22;
            --card-bg: #161618;
            --link-blue: #8ab4f8;
        }

        * { transition: all 0.2s ease-out; box-sizing: border-box; }
        
        body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .decoration-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent), #ff9100, var(--accent));
            z-index: 1001;
        }

        nav {
            width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; z-index: 100; pointer-events: none;
        }
        nav * { pointer-events: auto; }

        .nav-logo-small { height: 30px; cursor: pointer; display: none; }
        .theme-btn { font-size: 20px; cursor: pointer; padding: 10px; opacity: 0.6; }

        /* Centered Home UI */
        .main-container {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; width: 100%; max-width: 800px; padding: 20px;
        }

        .main-logo { width: 450px; max-width: 90% !important; margin-bottom: 50px; cursor: pointer; }

        .search-bar {
            background: var(--card-bg); border: 2px solid var(--border);
            padding: 12px 20px; border-radius: 50px; 
            display: flex; align-items: center; gap: 15px; width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
        }
        .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 15px 50px rgba(0,0,0,0.1); }
        
        input#user-input { 
            flex: 1; border: none; outline: none; background: transparent; 
            font-size: 20px; color: var(--text); padding: 5px;
        }

        .btn-search { 
            background: var(--accent); color: #000; border: none; 
            padding: 14px 35px; border-radius: 30px; font-weight: 800; cursor: pointer; font-size: 16px;
        }

        /* Article View Styling */
        #response-frame { width: 95%; max-width: 1000px; margin: 120px auto 80px; display: none; }
        
        .article-card { 
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 60px; border-radius: 40px; box-shadow: 0 25px 60px rgba(0,0,0,0.04);
        }

        .article-title { font-family: 'Lexend'; font-size: 56px; margin-bottom: 30px; line-height: 1; color: var(--text); }
        .article-body { font-size: 19px; line-height: 1.8; opacity: 0.95; color: var(--text); }
        .article-body p { margin-bottom: 25px; }
        .article-body a { color: var(--link-blue); text-decoration: none; font-weight: 600; border-bottom: 2px solid transparent; }
        .article-body a:hover { border-bottom-color: var(--link-blue); }

        .nodes-label { font-size: 13px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 3px; margin: 60px 0 30px; display: block; text-align: center;}

        .related-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; width: 100%; padding-bottom: 50px;
        }
        .node-item {
            background: var(--card-bg); padding: 25px; border-radius: 24px;
            border: 1px solid var(--border); cursor: pointer; text-align: center;
        }
        .node-item:hover { border-color: var(--accent); transform: translateY(-5px); background: var(--accent); color: #000; }

        .loader { display: none; text-align: center; padding: 150px; font-weight: 800; font-size: 18px; letter-spacing: 2px; }

        /* Conditional Layouts */
        body.searching .main-container { display: none; }
        body.searching #response-frame { display: block; }
        body.searching .nav-logo-small { display: block; }
        
        body.home #response-frame { display: none; }
        body.home .main-container { display: flex; }
        body.home .nav-logo-small { display: none; }

    </style>
</head>
<body id="body" class="home">

    <div class="decoration-line"></div>

    <nav>
        <img src="GartupBanner.png" alt="Gartup" class="nav-logo-small" onclick="goHome()">
        <span class="theme-btn" onclick="toggleTheme()">🌓</span>
    </nav>

    <div class="main-container">
        <img src="GartupBanner.png" alt="Gartup" class="main-logo" onclick="goHome()">
        <div class="search-bar">
            <input type="text" id="user-input" placeholder="Search the world index..." autocomplete="off">
            <button class="btn-search" onclick="handleSearchClick()">Index</button>
        </div>
    </div>

    <div id="status" class="loader">INDEXING ARCHIVES...</div>

    <div id="response-frame">
        <div class="article-card">
            <h1 id="article-title" class="article-title"></h1>
            <div id="article-content" class="article-body"></div>
        </div>
        
        <span class="nodes-label">Related Knowledge Nodes</span>
        <div id="related-grid" class="related-grid"></div>
    </div>

    <script>
        function toggleTheme() {
            const b = document.body;
            b.getAttribute('data-theme') === 'dark' ? b.removeAttribute('data-theme') : b.setAttribute('data-theme', 'dark');
        }

        function goHome() {
            window.history.pushState({}, '', window.location.pathname);
            document.body.className = "home";
            document.getElementById('status').style.display = "none";
            document.getElementById('user-input').value = "";
            document.title = "Gartup | World Index";
        }

        function handleSearchClick() {
            const q = document.getElementById('user-input').value.trim();
            if (q) nativeSearch(q);
        }

        async function nativeSearch(query) {
            const body = document.body;
            const status = document.getElementById('status');
            const frame = document.getElementById('response-frame');
            const contentElem = document.getElementById('article-content');
            const gridElem = document.getElementById('related-grid');

            // Set URL and State
            const cleanQuery = query.replace(/_/g, ' ');
            const newUrl = window.location.origin + window.location.pathname + '?q=' + encodeURIComponent(cleanQuery);
            window.history.pushState({ query: cleanQuery }, '', newUrl);
            
            body.className = "searching";
            status.style.display = "block";
            frame.style.display = "none";
            gridElem.innerHTML = "";
            window.scrollTo({top: 0, behavior: 'smooth'});

            try {
                // Get matching page
                const searchRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(cleanQuery)}&format=json&origin=*`);
                const searchData = await searchRes.json();
                
                if (!searchData.query.search.length) throw new Error("No results");
                
                const bestTitle = searchData.query.search[0].title;
                document.title = `${bestTitle} - Gartup Index`;

                // Get content
                const contentRes = await fetch(`https://en.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(bestTitle)}&prop=text&format=json&origin=*&disableeditsection=1&mobileformat=1`);
                const contentData = await contentRes.json();
                
                document.getElementById('article-title').innerText = bestTitle;
                
                let container = document.createElement('div');
                container.innerHTML = contentData.parse.text["*"];
                
                // Cleanup
                const toRemove = container.querySelectorAll('.infobox, .ambox, .navbox, .metadata, .mw-editsection, .reflist, .reference');
                toRemove.forEach(el => el.remove());

                // Localize links
                container.querySelectorAll('a').forEach(a => {
                    const href = a.getAttribute('href');
                    if (href && href.startsWith('/wiki/')) {
                        const target = href.replace('/wiki/', '').replace(/_/g, ' ');
                        a.setAttribute('href', `javascript:nativeSearch('${target}')`);
                    } else if (href && (href.startsWith('http') || href.startsWith('//'))) {
                        a.setAttribute('target', '_blank');
                    } else {
                        a.removeAttribute('href'); // Remove internal anchors
                    }
                });

                contentElem.innerHTML = container.innerHTML;

                // Related Nodes
                searchData.query.search.slice(1, 10).forEach(item => {
                    const node = document.createElement('div');
                    node.className = 'node-item';
                    node.onclick = () => nativeSearch(item.title);
                    node.innerHTML = `<h3 style="font-size:16px; margin:0; font-weight:700;">${item.title}</h3>`;
                    gridElem.appendChild(node);
                });

                status.style.display = "none";
                frame.style.display = "block";

            } catch (err) {
                status.style.display = "none";
                frame.style.display = "block";
                document.getElementById('article-title').innerText = "Query Error";
                contentElem.innerHTML = "This node could not be retrieved from the archives.";
            }
        }

        // Handle browser back/forward buttons and direct links
        window.onpopstate = (e) => {
            const q = new URLSearchParams(window.location.search).get('q');
            q ? nativeSearch(q) : goHome();
        };

        window.onload = () => {
            const q = new URLSearchParams(window.location.search).get('q');
            if (q) nativeSearch(q);
        };

        document.getElementById('user-input').addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') handleSearchClick(); 
        });
    </script>
</body>
</html>
