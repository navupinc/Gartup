<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gary | Gartup AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FFE900; --bg: #ffffff; --text: #111111;
            --border: #f0f0f2; --card-bg: #f9f9fb;
            --user-msg: #f0f0f2; --gary-msg: #ffffff;
            --error: #ff4b4b;
        }

        [data-theme="dark"] {
            --bg: #0a0a0b; --text: #f5f5f7;
            --border: #1f1f22; --card-bg: #161618;
            --user-msg: #1f1f22; --gary-msg: #161618;
        }

        * { transition: background 0.3s, color 0.3s; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        .decoration-line {
            position: fixed; top: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent), #ff9100, var(--accent));
            z-index: 1100;
        }

        header {
            padding: 12px 20px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid var(--border);
            background: var(--bg); position: fixed; top: 4px; width: 100%; z-index: 1000;
        }

        .nav-logo { font-family: 'Lexend'; font-size: 22px; font-weight: 700; cursor: pointer; letter-spacing: -1px; }

        .header-tools { display: flex; gap: 15px; align-items: center; }

        #chat-container {
            flex: 1; padding: 100px 15px 160px;
            display: flex; flex-direction: column; gap: 15px;
            width: 100%; max-width: 800px; margin: 0 auto;
        }

        .message {
            max-width: 85%; padding: 14px 20px; border-radius: 22px;
            line-height: 1.6; font-size: 15px; animation: fadeInUp 0.3s ease forwards;
            word-wrap: break-word; position: relative;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 4px; }
        .gary-message { align-self: flex-start; background: var(--gary-msg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        code { background: rgba(0,0,0,0.05); padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        pre { background: #111; color: #fff; padding: 15px; border-radius: 12px; overflow-x: auto; margin: 10px 0; }
        
        .typing { font-style: italic; opacity: 0.6; font-size: 13px; }

        .input-area {
            position: fixed; bottom: 0; width: 100%;
            padding: 20px 15px 40px; background: linear-gradient(to top, var(--bg) 80%, transparent);
            z-index: 1000;
        }

        .input-container {
            max-width: 700px; margin: 0 auto; display: flex; gap: 10px;
            background: var(--card-bg); padding: 5px 5px 5px 18px;
            border-radius: 35px; border: 2px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        input {
            flex: 1; border: none; background: transparent; color: var(--text);
            font-size: 16px; outline: none; padding: 10px 0;
        }

        .send-btn {
            background: var(--accent); border: none; width: 42px; height: 42px;
            border-radius: 50%; cursor: pointer; font-size: 18px; display: flex;
            align-items: center; justify-content: center;
        }

        #welcome { text-align: center; padding: 40px 20px; }
        #welcome h1 { font-family: 'Lexend'; font-size: 36px; margin: 0; }
        #welcome p { opacity: 0.5; margin-top: 10px; }

        .btn-ghost { background: transparent; border: none; cursor: pointer; font-size: 18px; opacity: 0.6; padding: 5px; }
        .btn-ghost:hover { opacity: 1; }

        @media (max-width: 480px) {
            #chat-container { padding-top: 80px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div class="decoration-line"></div>

    <header>
        <div class="nav-logo" onclick="location.reload()">GARY</div>
        <div class="header-tools">
            <button class="btn-ghost" onclick="clearChat()" title="Clear memory">🗑️</button>
            <div onclick="toggleTheme()" style="cursor:pointer; font-size: 20px;">🌓</div>
        </div>
    </header>

    <div id="chat-container">
        <div id="welcome">
            <h1>Meet Gary</h1>
            <p>Gartup's artificial intelligence. 🚀</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Say something..." autocomplete="off">
            <button class="send-btn" id="send-btn">➔</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // LA API KEY YA NO ESTÁ AQUÍ. SE MANEJA EN EL SERVIDOR (/api/chat).

        const chatBox = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const welcome = document.getElementById('welcome');

        let messagesHistory = [
            { role: "system", content: "You are Gary, the AI for Gartup. You are witty, concise, and professional. Use emojis. You can write code snippets or bold text if needed." }
        ];

        function toggleTheme() {
            document.body.hasAttribute('data-theme') ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
        }

        function clearChat() {
            if(confirm("Wipe Gary's memory?")) {
                messagesHistory = [messagesHistory[0]];
                chatBox.innerHTML = '';
                welcome.style.display = 'block';
                chatBox.appendChild(welcome);
            }
        }

        function addMessageToUI(role, text) {
            welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            
            if (role === 'gary') {
                div.innerHTML = marked.parse(text); 
            } else {
                div.innerText = text;
            }
            
            chatBox.appendChild(div);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            return div;
        }

        async function askGary() {
            const prompt = input.value.trim();
            if (!prompt) return;

            addMessageToUI('user', prompt);
            messagesHistory.push({ role: "user", content: prompt });
            input.value = '';
            
            const garyMsgUI = addMessageToUI('gary', '...');
            garyMsgUI.classList.add('typing');

            try {
                // Llamamos a nuestra función de servidor de Vercel (Seguro)
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        messages: messagesHistory
                    })
                });

                if (!response.ok) throw new Error("Error en la respuesta del servidor");

                const data = await response.json();
                const reply = data.choices[0].message.content;

                garyMsgUI.classList.remove('typing');
                garyMsgUI.innerHTML = marked.parse(reply);
                messagesHistory.push({ role: "assistant", content: reply });
                
                if (messagesHistory.length > 16) messagesHistory.splice(1, 2);

                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } catch (err) {
                garyMsgUI.classList.remove('typing');
                garyMsgUI.innerText = "Systems overloaded or configuration error. ⚠️";
                garyMsgUI.style.color = "var(--error)";
                console.error(err);
            }
        }

        btn.onclick = askGary;
        input.onkeypress = (e) => { if(e.key === 'Enter') askGary(); };
    </script>
</body>
</html>
